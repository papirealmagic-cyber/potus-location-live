    <script>
        function initMap() {
            var whiteHouse = {lat: 38.8977, lng: -77.0365};
            var map = new google.maps.Map(document.getElementById('map'), {
                zoom: 18, 
                center: whiteHouse,
                mapTypeId: 'roadmap'
            });

            var overlay = new google.maps.OverlayView();
            overlay.onAdd = function() {
                var layer = this.getPanes().overlayMouseTarget;
                layer.appendChild(document.getElementById('marker-overlay'));
            };
            overlay.draw = function() {
                var projection = this.getProjection();
                var pos = projection.fromLatLngToDivPixel(new google.maps.LatLng(38.8977, -77.0365));
                var div = document.getElementById('marker-overlay');
                div.style.left = (pos.x - 75) + 'px';
                div.style.top = (pos.y - 75) + 'px';
            };
            overlay.setMap(map);
        }
        window.onload = initMap;
    </script>
