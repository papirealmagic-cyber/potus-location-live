<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body, html, #map { height: 100%; margin: 0; padding: 0; width: 100%; }
        /* The container for our sticker */
        .map-overlay {
            position: absolute;
            width: 150px;
            height: 150px;
            z-index: 1000;
        }
    </style>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAZg9pzWoBhlkiArmE0rWtLhFTonsPO1jI"></script>
</head>
<body>
    <div id="map"></div>
    <script>
        function initMap() {
            var whiteHouse = {lat: 38.8977, lng: -77.0365};
            var map = new google.maps.Map(document.getElementById('map'), {
                zoom: 18, 
                center: whiteHouse,
                mapTypeId: 'roadmap'
            });

            // Create a custom overlay for the image
            class GIFOverlay extends google.maps.OverlayView {
                constructor(latlng, url) {
                    super();
                    this.latlng = latlng;
                    this.url = url;
                }
                onAdd() {
                    this.div = document.createElement('div');
                    this.div.className = 'map-overlay';
                    const img = document.createElement('img');
                    img.src = this.url;
                    img.style.width = '150px';
                    img.style.height = '150px';
                    this.div.appendChild(img);
                    this.getPanes().overlayImage.appendChild(this.div);
                }
                draw() {
                    const projection = this.getProjection();
                    const point = projection.fromLatLngToDivPixel(this.latlng);
                    if (this.div) {
                        this.div.style.left = (point.x - 75) + 'px';
                        this.div.style.top = (point.y - 75) + 'px';
                    }
                }
                onRemove() {
                    if (this.div) {
                        this.div.parentNode.removeChild(this.div);
                        this.div = null;
                    }
                }
            }

            var overlay = new GIFOverlay(whiteHouse, 'https://i.imgur.com/8QG3t7f.gif');
            overlay.setMap(map);
        }
        window.onload = initMap;
    </script>
</body>
</html>
