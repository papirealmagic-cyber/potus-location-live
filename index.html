<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body, html, #map { height: 100%; margin: 0; padding: 0; width: 100%; }
    </style>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAZg9pzWoBhlkiArmE0rWtLhFTonsPO1jI"></script>
</head>
<body>
    <div id="map"></div>
    <script>
        function initMap() {
            var whiteHouse = {lat: 38.8977, lng: -77.0365};
            var map = new google.maps.Map(document.getElementById('map'), {
                zoom: 18, 
                center: whiteHouse,
                mapTypeId: 'roadmap'
            });

            // Using official Google Maps Marker API with a proven Giphy URL
            new google.maps.Marker({
                position: whiteHouse,
                map: map,
                icon: {
                    url: 'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/xT9IgusfHcIQ6b8j2U/giphy.gif',
                    scaledSize: new google.maps.Size(150, 150),
                    anchor: new google.maps.Point(75, 75)
                }
            });
        }
        window.onload = initMap;
    </script>
</body>
</html>
